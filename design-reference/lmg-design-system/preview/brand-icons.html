<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Iconography" subtitle="Lucide icon set · line · 1.5 px stroke" viewport="700x260" --><html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/lucide@0.475.0/dist/umd/lucide.min.js"></script>
<style>
  body { padding: 24px; }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 12px; }
  .ico { display:flex; flex-direction:column; align-items:center; gap:6px; padding: 12px 4px; border-radius: var(--r-sm); }
  .ico i { width: 22px; height: 22px; color: var(--fg-1); }
  .ico .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
</style>
</head><body>
<div class="label-eyebrow" style="margin-bottom:10px">Lucide · 1.5 px stroke · 16 / 20 / 24 px</div>
<div class="grid">
  <div class="ico"><i data-lucide="trending-up"></i><span class="lbl">trending-up</span></div>
  <div class="ico"><i data-lucide="play"></i><span class="lbl">play</span></div>
  <div class="ico"><i data-lucide="users"></i><span class="lbl">users</span></div>
  <div class="ico"><i data-lucide="bar-chart-3"></i><span class="lbl">bar-chart</span></div>
  <div class="ico"><i data-lucide="sparkles"></i><span class="lbl">sparkles</span></div>
  <div class="ico"><i data-lucide="globe"></i><span class="lbl">globe</span></div>
  <div class="ico"><i data-lucide="sun"></i><span class="lbl">sun</span></div>
  <div class="ico"><i data-lucide="moon"></i><span class="lbl">moon</span></div>
  <div class="ico"><i data-lucide="instagram"></i><span class="lbl">instagram</span></div>
  <div class="ico"><i data-lucide="youtube"></i><span class="lbl">youtube</span></div>
  <div class="ico"><i data-lucide="search"></i><span class="lbl">search</span></div>
  <div class="ico"><i data-lucide="arrow-right"></i><span class="lbl">arrow-right</span></div>
  <div class="ico"><i data-lucide="check"></i><span class="lbl">check</span></div>
  <div class="ico"><i data-lucide="mail"></i><span class="lbl">mail</span></div>
  <div class="ico"><i data-lucide="briefcase"></i><span class="lbl">briefcase</span></div>
  <div class="ico"><i data-lucide="heart"></i><span class="lbl">heart</span></div>
</div>
<script>lucide.createIcons();</script>
</body></html>
