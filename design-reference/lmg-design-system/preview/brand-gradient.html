<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Resource Hero Gradient" subtitle="Purple → magenta → pink gradient used on resource detail headers" viewport="700x380" --><html><head><meta charset="utf-8"><title>Resource Gradient</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; min-height: 100vh; }
  .bg { background: var(--grad-resource); padding: 56px 48px; color: #fff; min-height: 380px; display: flex; flex-direction: column; gap: 18px; justify-content: center; }
  .tags { display: flex; gap: 8px; }
  .tag-level { background: rgba(255,255,255,0.95); color: #0a5e34; padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .tag-cat { background: rgba(255,255,255,0.22); padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  h1 { margin: 0; font-size: 42px; line-height: 1.05; letter-spacing: -0.02em; font-weight: 800; max-width: 22ch; }
  p { margin: 0; max-width: 60ch; opacity: 0.92; line-height: 1.55; }
  .swatches { display:flex; gap: 14px; align-items: center; margin-top: 6px; }
  .sw { display:flex; flex-direction: column; gap: 4px; font-family: var(--font-mono); font-size: 11px; }
  .sw .chip { width: 56px; height: 36px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.5); }
</style>
</head><body>
<div class="bg">
  <div class="tags">
    <span class="tag-level">beginner</span>
    <span class="tag-cat">General</span>
  </div>
  <h1>Platform Comparison Guide: Instagram vs TikTok vs YouTube</h1>
  <p>The resource-hero gradient — purple → magenta → pink — used on all downloadable resource detail pages. White type, white pills.</p>
  <div class="swatches">
    <div class="sw"><div class="chip" style="background: #B341E8"></div>#B341E8</div>
    <div class="sw"><div class="chip" style="background: #D63D8E"></div>#D63D8E</div>
    <div class="sw"><div class="chip" style="background: #FF4D94"></div>#FF4D94</div>
  </div>
</div>
</body></html>
