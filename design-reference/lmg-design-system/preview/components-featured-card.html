<!DOCTYPE html>
<!-- @dsCard group="Components" name="Featured Resource Card" subtitle="Editorial photo + yellow Featured pill + yellow CTA" viewport="900x380" --><html><head><meta charset="utf-8"><title>Featured Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<link rel="stylesheet" href="../ui_kits/website/site.css">
<link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/lucide@0.475.0/dist/umd/lucide.min.js"></script>
<style>body{ background: var(--bg-1); padding: 24px; } .lmg-featured-card { max-width: none; }</style>
</head><body class="card">
<div class="lmg-featured-card">
  <div class="lmg-featured-photo" style="background-image: url('../assets/featured-photo.jpg')">
    <span class="lmg-featured-pill"><i data-lucide="star" style="width:12px;height:12px"></i> Featured</span>
  </div>
  <div class="lmg-featured-body">
    <h3>Complete Brand Partnership Guide</h3>
    <p>Everything you need to know about securing and managing brand partnerships. Proven strategies for pitching, negotiating, and building long-term profitable relationships.</p>
    <div class="lmg-featured-meta">
      <span><i data-lucide="eye" style="width:14px;height:14px"></i> 2,547 views</span>
      <span><i data-lucide="download" style="width:14px;height:14px"></i> 892 downloads</span>
      <span><i data-lucide="clock" style="width:14px;height:14px"></i> 15 min read</span>
    </div>
    <button class="lmg-btn lmg-btn-primary lmg-btn-lg"><i data-lucide="download" style="width:18px;height:18px"></i> Download Now - Free</button>
  </div>
</div>
<script>lucide.createIcons();</script>
</body></html>
