<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Neutral Scale" subtitle="Warm neutral scale 0 → 950" viewport="700x260" --><html><head><meta charset="utf-8"><title>Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body class="card">
<div class="row">
  <div class="swatch"><div class="chip" style="background: var(--neutral-0); border-bottom: 1px solid var(--border-1)"></div><div class="meta"><div class="name">0</div><div class="hex">#FFFFFF</div></div></div>
  <div class="swatch"><div class="chip" style="background: var(--neutral-50)"></div><div class="meta"><div class="name">50</div><div class="hex">#FAFAF8</div></div></div>
  <div class="swatch"><div class="chip" style="background: var(--neutral-100)"></div><div class="meta"><div class="name">100</div><div class="hex">#F4F3EF</div></div></div>
  <div class="swatch"><div class="chip" style="background: var(--neutral-200)"></div><div class="meta"><div class="name">200</div><div class="hex">#E8E6DF</div></div></div>
  <div class="swatch"><div class="chip" style="background: var(--neutral-300)"></div><div class="meta"><div class="name">300</div><div class="hex">#CFCDC4</div></div></div>
  <div class="swatch"><div class="chip" style="background: var(--neutral-400)"></div><div class="meta"><div class="name">400</div><div class="hex">#9C9A91</div></div></div>
</div>
<div class="row">
  <div class="swatch"><div class="chip" style="background: var(--neutral-500)"></div><div class="meta"><div class="name">500</div><div class="hex" style="color:#fff">#6D6B65</div></div></div>

  <div class="swatch"><div class="chip" style="background: var(--neutral-800)"></div><div class="meta"><div class="name">800</div><div class="hex" style="color:#fff">#232323</div></div></div>
  <div class="swatch"><div class="chip" style="background: var(--neutral-900)"></div><div class="meta"><div class="name">900</div><div class="hex" style="color:#fff">#121212</div></div></div>
  <div class="swatch"><div class="chip" style="background: var(--neutral-950)"></div><div class="meta"><div class="name">950</div><div class="hex" style="color:#fff">#0A0A0A</div></div></div>
</div>
</body></html>
