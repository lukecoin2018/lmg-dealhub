<!DOCTYPE html>
<!-- @dsCard group="Components" name="Stat Tiles" subtitle="Hero stat cards + inline icon-stats" viewport="700x220" --><html><head><meta charset="utf-8"><title>Stat Tiles</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/lucide@0.475.0/dist/umd/lucide.min.js"></script>
<style> body{ background: var(--bg-2); } </style>
</head><body class="card">
<div class="row" style="gap:16px">
  <div class="lmg-stat blue"><div class="num">35.6%</div><div class="lbl">YoY Growth</div></div>
  <div class="lmg-stat pink"><div class="num">86%</div><div class="lbl">Consumer Influence</div></div>
  <div class="lmg-stat yellow"><div class="num">10K–1M</div><div class="lbl">Follower Range</div></div>
  <div class="lmg-stat"><div class="num">18%</div><div class="lbl">TikTok Engagement</div></div>
</div>
<div class="row" style="gap:32px; padding-left:8px">
  <div class="lmg-inline-stat blue"><i data-lucide="trending-up" class="lmg-icon"></i> 86% Consumer Influence Rate</div>
  <div class="lmg-inline-stat pink"><i data-lucide="play" class="lmg-icon"></i> TikTok 18% Engagement</div>
  <div class="lmg-inline-stat yellow"><i data-lucide="users" class="lmg-icon"></i> 10K-1M Follower Range</div>
</div>
<script>lucide.createIcons();</script>
</body></html>
