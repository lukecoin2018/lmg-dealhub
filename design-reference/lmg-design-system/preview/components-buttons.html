<!DOCTYPE html>
<!-- @dsCard group="Components" name="Buttons" subtitle="Primary (yellow) · Secondary (pink) · Blue · Dark · Outline · Ghost" viewport="700x260" --><html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">

</head><body class="card">
<div class="row" style="align-items:center">
