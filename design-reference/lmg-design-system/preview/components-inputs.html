<!DOCTYPE html>
<!-- @dsCard group="Components" name="Form Inputs" subtitle="Text input · email (focus) · select · textarea" viewport="700x380" --><html><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<link rel="stylesheet" href="_card.css">
</head><body class="card">
<div class="row" style="gap:20px">
  <div class="lmg-field" style="flex:1; min-width:200px"><label>Full name</label><input class="lmg-input" type="text" placeholder="Alex Rivera"></div>
  <div class="lmg-field" style="flex:1; min-width:200px"><label>Work email</label><input class="lmg-input" type="email" placeholder="alex@brand.com" value="alex@brand.com" style="border-color: var(--lmg-yellow); box-shadow: var(--shadow-glow-yellow);"></div>
</div>
<div class="row" style="gap:20px">
  <div class="lmg-field" style="flex:1; min-width:200px"><label>Brand / Agency</label><input class="lmg-input" type="text" placeholder="Maison Étoile"></div>
  <div class="lmg-field" style="flex:1; min-width:200px"><label>Primary niche</label>
    <select class="lmg-select">
      <option>Lifestyle</option><option>Luxury</option><option>Fashion</option><option>Wellness</option><option>Travel</option>
    </select>
  </div>
</div>
<div class="lmg-field"><label>Campaign brief</label><textarea class="lmg-textarea" placeholder="Tell us about your goals, audience, and timeline…"></textarea></div>
</body></html>
