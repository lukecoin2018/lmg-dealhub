<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ServiceCard — LMG Media</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="../../components.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.475.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 40px; background: var(--bg-2); display: grid; place-items: center; min-height: 100vh; box-sizing: border-box; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; max-width: 720px; }
  @media (max-width: 680px){ .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div id="app"></div>
<script type="text/babel">
  const { ServiceCard } = window.LMGMediaDesignSystem_019e25;
  function Demo() {
    return (
      <div className="grid">
        <ServiceCard
          audience="brand"
          pill="For Brands"
          photo="../../assets/svc-brd-campaign.jpg"
          icon="target"
          title="Strategic Campaign Development"
          description="Data-driven matchmaking that connects your brand with the right creators."
          features={["Audience-fit analysis", "Creative direction", "Performance benchmarks"]}
          moreCount={3}
          primaryLabel="Get Quote"
          secondaryLabel="Learn More"
        />
        <ServiceCard
          audience="influencer"
          pill="For Influencers"
          photo="../../assets/svc-inf-personal-brand.jpg"
          icon="sparkles"
          title="Personal Brand Development"
          description="Build an authentic brand that attracts the partnerships you actually want."
          features={["Positioning strategy", "Rate negotiation", "Exclusive brand deals"]}
          moreCount={2}
          primaryLabel="Get Started"
          secondaryLabel="Learn More"
        />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('app')).render(<Demo />);
  setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
</script>
</body>
</html>
