<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LMG Media — Resources Redesign</title>
<link rel="stylesheet" href="colors_and_type.css" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background: #0a0a0a; }

  /* ═══════════ Control bar ═══════════ */
  .ctrl {
    position: sticky; top: 0; z-index: 200;
    display: flex; align-items: center; gap: 22px;
    padding: 11px clamp(16px,3vw,32px);
    background: rgba(10,10,10,0.9); backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(255,255,255,0.08); color: #fff;
  }
  .ctrl-brand { font-family: var(--font-display); font-weight: 700; letter-spacing: .02em; font-size: 16px; color: var(--lmg-yellow); white-space: nowrap; line-height:1; }
  .ctrl-brand small { font-family: var(--font-ui); display:block; font-size: 8.5px; letter-spacing: .3em; color: rgba(255,255,255,.45); font-weight:600; margin-top:3px; }
  .ctrl-grp { display:flex; align-items:center; gap:9px; }
  .ctrl-label { font-family: var(--font-ui); font-size: 9.5px; letter-spacing: .18em; text-transform: uppercase; color: rgba(255,255,255,.38); font-weight: 700; }
  .seg { display: flex; gap: 2px; padding: 3px; background: rgba(255,255,255,0.07); border-radius: var(--r-pill); }
  .seg button { font-family: var(--font-ui); font-size: 12px; font-weight: 700; letter-spacing: .01em; border: 0; background: transparent; color: rgba(255,255,255,.55); padding: 7px 15px; border-radius: var(--r-pill); cursor: pointer; transition: all .16s var(--ease-out); }
  .seg button:hover { color: #fff; }
  .seg button.on { background: #fff; color: #111; }
  .seg.theme button.on { background: var(--lmg-yellow); color: #111; }
  .ctrl-spacer { flex:1; min-width:8px; }
  .ctrl-note { flex:0 1 420px; min-width:280px; font-family: var(--font-ui); font-size: 11.5px; color: rgba(255,255,255,.5); line-height: 1.45; text-align: right; }
  .ctrl-note b { color: var(--lmg-yellow); font-weight: 800; }
  @media (max-width: 1120px){ .ctrl-note{display:none;} }

  /* ═══════════ Page shell ═══════════ */
  .stage { padding: 22px; }
  .page { position:relative; max-width: 1480px; margin: 0 auto; border-radius: 20px; overflow: hidden; box-shadow: 0 50px 120px rgba(0,0,0,.5); background:#0a0a0a; }
  .wrap { padding: 0 clamp(22px, 4vw, 64px); }

  /* per-direction palette vars on .pg */
  .pg { --pg-bg:#0a0a0a; --pg-fg:#f4f1ea; --pg-fg2:rgba(244,241,234,.6); --pg-card:#141414; --pg-line:rgba(255,255,255,.1); background: var(--pg-bg); color: var(--pg-fg); transition: background .3s var(--ease-out); }
  /* themes flip the palette */
  .pg.light[data-dir="a"] { --pg-bg:#F2EDE3; --pg-fg:#16130f; --pg-fg2:rgba(22,19,15,.6); --pg-card:#fff; --pg-line:rgba(22,19,15,.13); }
  .pg.dark[data-dir="a"]  { --pg-bg:#070707; --pg-fg:#f4f1ea; --pg-fg2:rgba(244,241,234,.55); --pg-card:#121212; --pg-line:rgba(255,255,255,.09); }

  .pg.light[data-dir="b"] { --pg-bg:#FFF9E8; --pg-fg:#15110a; --pg-fg2:rgba(21,17,10,.62); --pg-card:#fff; --pg-line:rgba(0,0,0,.12); }
  .pg.dark[data-dir="b"]  { --pg-bg:#120c14; --pg-fg:#fdf3ff; --pg-fg2:rgba(253,243,255,.6); --pg-card:#1c121f; --pg-line:rgba(255,255,255,.12); }

  .pg.light[data-dir="c"] { --pg-bg:#F7F2E7; --pg-fg:#1a1714; --pg-fg2:rgba(26,23,20,.58); --pg-card:#fffdf8; --pg-line:rgba(26,23,20,.14); }
  .pg.dark[data-dir="c"]  { --pg-bg:#100f0d; --pg-fg:#efe9dc; --pg-fg2:rgba(239,233,220,.55); --pg-card:#1a1815; --pg-line:rgba(239,233,220,.13); }

  /* ═══════════ shared atoms ═══════════ */
  .eyebrow { font-family: var(--font-ui); font-size: 11px; letter-spacing:.22em; text-transform:uppercase; font-weight:800; }
  .btn { font-family: var(--font-ui); font-weight: 800; font-size: 13.5px; letter-spacing:.01em; border:0; cursor:pointer; display:inline-flex; align-items:center; gap:7px; padding: 11px 18px; border-radius: var(--r-pill); transition: all .16s var(--ease-out); text-decoration:none; }
  .btn-dl { background: var(--lmg-yellow); color:#111; }
  .btn-dl:hover { background:#fff; transform: translateY(-1px); }
  .ico { width:16px; height:16px; stroke: currentColor; fill:none; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; }
  .type-label { font-family: var(--font-ui); font-size: 10px; font-weight: 900; letter-spacing:.14em; text-transform: uppercase; }
  .aud { display:inline-flex; align-items:center; gap:6px; font-family: var(--font-ui); font-size:11px; font-weight:700; color: var(--pg-fg2); }
  .aud .dot { width:7px; height:7px; border-radius:50%; }

  /* ═══════════ MARQUEE ═══════════ */
  .marquee { overflow:hidden; border-top:1px solid var(--pg-line); border-bottom:1px solid var(--pg-line); padding:14px 0; margin-top: 4px; }
  .marquee-track { display:flex; gap:0; white-space:nowrap; width:max-content; animation: scroll-x 32s linear infinite; }
  .marquee-track span { font-family: var(--font-sans); font-weight:800; font-size: 22px; letter-spacing:-.01em; padding: 0 26px; display:inline-flex; align-items:center; gap:26px; color: var(--pg-fg); }
  .marquee-track span::after { content:"●"; font-size:9px; color: var(--lmg-pink); }
  .pg[data-dir="b"] .marquee { background: var(--lmg-yellow); border:0; }
  .pg[data-dir="b"] .marquee-track span { color:#111; }
  .pg[data-dir="b"] .marquee-track span::after { color:#111; }
  @keyframes scroll-x { to { transform: translateX(-50%); } }

  /* ═══════════ HERO ═══════════ */
  .hero { position:relative; }
  .hero-top { display:flex; align-items:flex-start; justify-content:space-between; gap:20px; padding-top: clamp(34px,5vw,60px); }
  .hero-top .eyebrow { color: var(--lmg-pink); }
  .hero-top .stats { display:flex; gap: 26px; text-align:right; }
  .hero-top .stats .s b { font-family: var(--font-sans); font-weight:800; font-size: 26px; display:block; color: var(--pg-fg); letter-spacing:-.02em; }
  .hero-top .stats .s span { font-family: var(--font-ui); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color: var(--pg-fg2); font-weight:700; }

  /* Gallery hero — huge type, immediate */
  .pg[data-dir="a"] .hero h1 { font-family: var(--font-sans); font-weight:800; font-size: clamp(60px, 10vw, 168px); line-height:.82; letter-spacing:-.045em; margin: 18px 0 0; color: var(--pg-fg); }
  .pg[data-dir="a"] .hero h1 .pk { color: var(--lmg-pink); }
  .pg[data-dir="a"] .hero h1 .yl { color: var(--lmg-yellow); }
  .pg[data-dir="a"] .hero .sub { display:flex; align-items:flex-end; justify-content:space-between; gap:30px; margin: 22px 0 0; }
  .pg[data-dir="a"] .hero .sub p { font-size:18px; line-height:1.5; color: var(--pg-fg2); max-width: 520px; margin:0; }

  /* Newsstand hero — sticker chaos */
  .pg[data-dir="b"] .hero h1 { font-family: var(--font-sans); font-weight:800; font-size: clamp(64px, 11vw, 190px); line-height:.8; letter-spacing:-.05em; margin: 16px 0 0; color: var(--pg-fg); text-transform:uppercase; }
  .pg[data-dir="b"] .hero h1 em { font-style:normal; color: var(--lmg-pink); }
  .pg[data-dir="b"] .hero .sub p { font-size:19px; font-weight:600; line-height:1.45; color: var(--pg-fg); max-width: 560px; margin: 20px 0 0; }

  /* Editorial hero — serif masthead */
  .pg[data-dir="c"] .hero { text-align:center; padding-bottom: 8px; }
  .pg[data-dir="c"] .hero .rule-top { display:flex; align-items:center; justify-content:center; gap:14px; font-family:var(--font-ui); font-size:10.5px; letter-spacing:.34em; text-transform:uppercase; color:var(--pg-fg2); font-weight:700; padding-top: clamp(30px,4vw,52px); }
  .pg[data-dir="c"] .hero .rule-top::before, .pg[data-dir="c"] .hero .rule-top::after { content:""; height:1px; width:64px; background: var(--pg-line); }
  .pg[data-dir="c"] .hero h1 { font-family: var(--font-display); font-weight:800; font-size: clamp(58px, 9vw, 150px); line-height:.94; letter-spacing:-.01em; margin: 14px 0 0; color: var(--pg-fg); }
  .pg[data-dir="c"] .hero h1 em { font-style:italic; font-weight:500; color: var(--lmg-pink); }
  .pg[data-dir="c"] .hero .sub p { font-family: var(--font-display); font-style:italic; font-size: 21px; color: var(--pg-fg2); max-width: 600px; margin: 16px auto 0; line-height:1.5; }

  /* ═══════════ Section head ═══════════ */
  .sec-head { display:flex; align-items:baseline; justify-content:space-between; gap:18px; margin: 40px 0 24px; }
  .sec-head h2 { font-family: var(--font-sans); font-weight:800; font-size: 24px; letter-spacing:-.02em; margin:0; color: var(--pg-fg); }
  .pg[data-dir="c"] .sec-head { justify-content:center; text-align:center; }
  .pg[data-dir="c"] .sec-head h2 { font-family: var(--font-display); }
  .sec-head .count { font-family: var(--font-ui); font-size:12px; color: var(--pg-fg2); font-weight:700; letter-spacing:.04em; }

  /* ═══════════ COVER GRID ═══════════ */
  .grid { display:grid; gap: clamp(16px,2vw,26px); }
  .pg[data-dir="a"] .grid { grid-template-columns: repeat(4, 1fr); }
  .pg[data-dir="b"] .grid { grid-template-columns: repeat(6, 1fr); gap: 20px; }
  .pg[data-dir="b"] .grid .card:nth-child(1){ grid-column: span 3; }
  .pg[data-dir="b"] .grid .card:nth-child(2){ grid-column: span 3; }
  .pg[data-dir="b"] .grid .card { grid-column: span 2; }
  .pg[data-dir="b"] .grid .card:nth-child(3n){ transform: rotate(-1.2deg); }
  .pg[data-dir="b"] .grid .card:nth-child(3n+1){ transform: rotate(.8deg); }
  .pg[data-dir="c"] .grid { grid-template-columns: repeat(3, 1fr); gap: 44px 36px; }

  .card { position:relative; display:flex; flex-direction:column; cursor:pointer; }
  .cover { position:relative; border-radius: 12px; overflow:hidden; aspect-ratio: 1 / 1.32; background: var(--pg-card); transition: transform .3s var(--ease-out), box-shadow .3s var(--ease-out); box-shadow: 0 12px 30px rgba(0,0,0,.4); }
  .pg.light[data-dir="b"] .cover, .pg.light[data-dir="c"] .cover { box-shadow: 0 14px 34px rgba(0,0,0,.16); }
  .cover img { width:100%; height:100%; object-fit:cover; object-position: top center; display:block; }
  .card:hover .cover { transform: translateY(-10px) scale(1.015); box-shadow: 0 26px 60px rgba(0,0,0,.55), 0 0 0 3px var(--glow,var(--lmg-pink)); }
  .pg[data-dir="b"] .card:hover .cover { transform: translateY(-8px) rotate(0deg) scale(1.02); }

  .cover .toplabel { position:absolute; top:11px; left:11px; background: rgba(10,10,10,.78); backdrop-filter: blur(6px); padding:5px 11px; border-radius: var(--r-pill); color:#fff; }
  .cover .aud-pill { position:absolute; top:13px; right:13px; width:11px; height:11px; border-radius:50%; box-shadow: 0 0 0 3px rgba(255,255,255,.35); }
  .cover .actions { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:9px; background: linear-gradient(180deg, rgba(8,8,8,.05), rgba(8,8,8,.82)); opacity:0; transition: opacity .28s var(--ease-out); }
  .card:hover .cover .actions { opacity:1; }
  .cover .actions .btn-view2 { background: rgba(255,255,255,.18); color:#fff; backdrop-filter: blur(4px); font-family:var(--font-ui); font-weight:800; font-size:13px; padding:10px 16px; border-radius:var(--r-pill); text-decoration:none; }
  .cover .actions .btn-view2:hover { background: rgba(255,255,255,.3); }

  .card .info { padding: 14px 2px 0; display:flex; flex-direction:column; gap:6px; }
  .card .info .top { display:flex; align-items:center; gap:9px; }
  .card .idx { font-family: var(--font-display); font-size: 15px; font-weight:700; color: var(--pg-fg2); }
  .card .info h3 { font-family: var(--font-sans); font-weight:800; font-size: 17px; line-height:1.2; letter-spacing:-.01em; margin:0; color: var(--pg-fg); }
  .pg[data-dir="c"] .card .info h3 { font-family: var(--font-display); font-weight:700; font-size:19px; }
  .card .info p { font-size: 13px; line-height:1.5; color: var(--pg-fg2); margin:0; }

  /* ═══════════ ARCHIVE ═══════════ */
  .archive { margin-top: clamp(40px,5vw,72px); border-top: 1px solid var(--pg-line); }
  .arch-pad { padding: 44px 0 72px; }
  .loadmore-wrap { text-align:center; }
  .loadmore { font-family: var(--font-ui); font-weight:800; font-size: 13.5px; letter-spacing:.02em; background: transparent; color: var(--pg-fg); border: 1.5px solid var(--pg-line); padding: 13px 28px; border-radius: var(--r-pill); cursor:pointer; display:inline-flex; align-items:center; gap:9px; transition: all .16s var(--ease-out); }
  .loadmore:hover { background: var(--pg-fg); color: var(--pg-bg); }
  .loadmore b { color: var(--lmg-yellow); }
  .loadmore:hover b { color: inherit; }
  .archive.open .loadmore-wrap { display:none; }
  .arch-reveal { display:none; }
  .archive.open .arch-reveal { display:block; }
  .arch-head { text-align:center; margin-bottom: 30px; }
  .arch-head .eyebrow { color: var(--pg-fg2); }
  .arch-head h2 { font-family: var(--font-sans); font-weight:800; font-size: 28px; letter-spacing:-.02em; margin: 8px 0 4px; color: var(--pg-fg); }
  .pg[data-dir="c"] .arch-head h2 { font-family: var(--font-display); }
  .arch-head p { font-size:13.5px; color: var(--pg-fg2); margin:0; }
  .arch-grid { display:grid; gap: 14px; grid-template-columns: repeat(2,1fr); }
  @media (max-width:900px){ .arch-grid{ grid-template-columns:1fr; } }
  .arow { display:grid; grid-template-columns: 116px 1fr auto; gap:16px; align-items:center; background: var(--pg-card); border:1px solid var(--pg-line); border-radius: 14px; padding:12px; transition: border-color .16s, transform .16s; }
  .arow:hover { transform: translateX(2px); border-color: var(--lmg-pink); }
  .arch-thumb { border-radius: 9px; overflow:hidden; aspect-ratio:16/11; background:#222; }
  .arch-thumb img { width:100%; height:100%; object-fit:cover; display:block; filter:saturate(.95); }
  .a-body { min-width:0; }
  .a-body .a-meta { display:flex; align-items:center; gap:11px; margin-bottom:6px; }
  .a-tag { font-family: var(--font-ui); font-size:9px; font-weight:900; letter-spacing:.12em; text-transform:uppercase; color: var(--pg-fg2); }
  .a-body h4 { font-family: var(--font-sans); font-weight:800; font-size:15px; margin:0 0 4px; letter-spacing:-.01em; color: var(--pg-fg); }
  .a-body p { font-size:12px; line-height:1.4; color: var(--pg-fg2); margin:0; }
  .a-act { display:flex; flex-direction:column; gap:7px; align-items:flex-end; white-space:nowrap; }
  .btn-sm { padding: 8px 14px; font-size:12px; }
  .btn-ghost { background:transparent; color: var(--pg-fg); border:1.5px solid var(--pg-line); }
  .btn-ghost:hover { border-color: var(--pg-fg); }
  .a-link { font-family:var(--font-ui); font-weight:700; font-size:12px; color: var(--pg-fg2); text-decoration:none; padding:4px 2px; border-bottom:2px solid transparent; }
  .a-link:hover { color: var(--pg-fg); border-bottom-color: var(--lmg-pink); }

  /* ═══════════ footer ═══════════ */
  .pg-foot { padding: 26px clamp(22px,4vw,64px); display:flex; align-items:center; justify-content:space-between; border-top:1px solid var(--pg-line); }
  .pg-foot .wm { font-family: var(--font-display); font-weight:700; color: var(--lmg-yellow); font-size:16px; }
  .pg-foot small { font-family:var(--font-ui); font-size:10.5px; letter-spacing:.18em; text-transform:uppercase; color: var(--pg-fg2); font-weight:700; }

  @media (max-width:1100px){
    .pg[data-dir="a"] .grid { grid-template-columns: repeat(3,1fr); }
    .pg[data-dir="b"] .grid { grid-template-columns: repeat(4,1fr); }
    .pg[data-dir="b"] .grid .card:nth-child(1),.pg[data-dir="b"] .grid .card:nth-child(2){ grid-column: span 2; }
  }
</style>
</head>

  <div class="ctrl">
    <div class="ctrl-brand">LMG&nbsp;Media<small>RESOURCES REDESIGN</small></div>
    <div class="ctrl-grp"><span class="ctrl-label">Direction</span>
      <div class="seg dir">
        <button data-dir="a" class="on">Gallery Wall</button>
        <button data-dir="b">Newsstand</button>
        <button data-dir="c">Editorial</button>
      </div>
    </div>
    <div class="ctrl-grp"><span class="ctrl-label">Theme</span>
      <div class="seg theme">
        <button data-theme="light">Light</button>
        <button data-theme="dark" class="on">Dark</button>
      </div>
    </div>
    <div class="ctrl-spacer"></div>
    <div class="ctrl-note" id="note"></div>

  <div class="stage">
    <div class="page">
      <div class="pg dark" id="pg" data-dir="a">
        <div class="wrap"><div class="hero" id="hero"></div></div>
        <div class="marquee"><div class="marquee-track" id="mq"></div></div>

        <div class="pg-foot"><span class="wm">LMG Media</span><small>Free Resource Library · 2026</small></div>

  { img:"assets/svc-brd-partnership.jpg", title:"Brand Safety & Compliance Checklist", type:"Toolkit", aud:"brand", desc:"Pre-flight checks to keep campaigns on the right side of the rules.", web:false },
  { img:"assets/svc-inf-deal-flow.jpg", title:"Influencer Rate Card Template", type:"Template", aud:"creator", desc:"A clean, editable rate card to send to brands today.", web:false },
  { img:"assets/svc-brd-campaign.jpg", title:"Campaign Reporting Dashboard Guide", type:"Guide", aud:"brand", desc:"The metrics that matter and how to present them.", web:false },

  { img:"assets/city-london.jpg", title:"Influencer FTC Disclosure Quick Guide", type:"Guide", aud:"universal", desc:"A short web reference on disclosure rules.", web:true },
];

const TYPE_COLOR = { Report:"#3AAFF4", Guide:"#3AAFF4", Toolkit:"#FF4D94", Template:"#FFD700", Framework:"#C77DFF" };
const AUD = { brand:{l:"For Brands",c:"#3AAFF4"}, creator:{l:"For Creators",c:"#FF4D94"}, universal:{l:"Universal",c:"#FFD700"} };

const HEROES = {
  a:`<div class="hero-top">
       <div class="eyebrow">Free Resource Library</div>
       <div class="stats"><div class="s"><b>23</b><span>Publications</span></div><div class="s"><b>13</b><span>Flagship Covers</span></div><div class="s"><b>$0</b><span>Always Free</span></div></div>
     </div>
     <h1>A wall of<br><span class="pk">free</span> things<br>worth <span class="yl">stealing</span>.</h1>
     <div class="sub"><p>Thirteen flagship publications — reports, toolkits, frameworks and templates. Beautifully made, instantly downloadable, nothing gated.</p></div>`,
  b:`<div class="hero-top"><div class="eyebrow" style="color:var(--lmg-pink)">The LMG Newsstand · Issue 26</div></div>
     <h1>Grab a<br>cover. <em>Go.</em></h1>
     <div class="sub"><p>A loud little newsstand of free influencer-marketing publications — built to be downloaded, never gated behind a form.</p></div>`,
  c:`<div class="rule-top">The LMG Media Library · Established 2026</div>
     <h1>The <em>Resource</em><br>Collection</h1>
     <div class="sub"><p>A curated shelf of reports, toolkits and templates for brands and creators — issued free, by LMG Media.</p></div>`,
};
const MQ = {
  a:["13 FLAGSHIP COVERS","REPORTS","TOOLKITS","FRAMEWORKS","TEMPLATES","NOTHING GATED","ALWAYS FREE"],
  b:["GRAB ONE","FREE","NO SIGN-UP","HOT OFF THE PRESS","23 PUBLICATIONS","DOWNLOAD NOW","FREE","ZINE ENERGY"],
  c:["REPORTS","·","TOOLKITS","·","FRAMEWORKS","·","TEMPLATES","·","GUIDES","·","ISSUED FREE"],
};
const T1HEAD = { a:"The Wall", b:"On the stand", c:"The Collection" };
const ARCHHEAD = { a:"More from the library", b:"More on the stand", c:"From the Archive" };
const NOTES = {
  a:`<b>Gallery Wall</b> — a dark, gallery backdrop turns each cover into a glowing object. Huge editorial headline, covers immediately, hover lifts a cover and rings it in its own colour.`,
  b:`<b>Newsstand</b> — maximalist zine energy. A yellow ticker, oversized uppercase type, and a slightly-askew mosaic with two oversized features. Loud, playful, fun to scroll.`,
  c:`<b>Editorial</b> — a refined Playfair masthead on warm paper, a structured 3-up contents grid with issue numbers, and a quiet "From the Archive" index below.`,
};

function ico(n){const p={download:'<path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/>',arrow:'<path d="M5 12h14m-6-6l6 6-6 6"/>'}[n];return `<svg class="ico" viewBox="0 0 24 24">${p}</svg>`;}

function coverCard(r, dir){
  const idx = dir==='c' ? `<span class="idx">${String(r.n).padStart(2,'0')}</span>` : '';
  const tc = TYPE_COLOR[r.type], ac = AUD[r.aud];
  return `<article class="card" tabindex="0" style="--glow:${ac.c}">
    <div class="cover">
      <img src="assets/covers/${r.f}.webp" alt="${r.title}" />
      <span class="toplabel type-label" style="color:${tc}">${r.type}</span>
      <span class="aud-pill" style="background:${ac.c}" title="${ac.l}"></span>
      <div class="actions">
        <a class="btn btn-dl" href="#">${ico('download')} Download Free</a>
        <a class="btn-view2" href="#">View Details</a>
      </div>
    </div>
    <div class="info">
      <div class="top">${idx}<span class="type-label" style="color:${tc}">${r.type}</span><span class="aud"><span class="dot" style="background:${ac.c}"></span>${ac.l}</span></div>
      <h3>${r.title}</h3>
      <p>${r.desc}</p>
    </div>
  </article>`;
}
function archRow(r){
  const ac = AUD[r.aud];
  const act = r.web
    ? `<a class="btn btn-ghost btn-sm" href="#">View Details ${ico('arrow')}</a>`
    : `<a class="btn btn-dl btn-sm" href="#">${ico('download')} Download</a><a class="a-link" href="#">Details</a>`;
  const flag = r.web ? `<span class="a-tag" style="color:var(--lmg-pink)">Web only</span>` : `<span class="a-tag">${r.type}</span>`;
  return `<article class="arow">
    <div class="arch-thumb"><img src="${r.img}" alt="${r.title}" /></div>
    <div class="a-body"><div class="a-meta">${flag}<span class="aud"><span class="dot" style="background:${ac.c}"></span>${ac.l}</span></div><h4>${r.title}</h4><p>${r.desc}</p></div>
    <div class="a-act">${act}</div>
  </article>`;
}
function render(dir){
  const pg=document.getElementById('pg'); pg.dataset.dir=dir;
  document.getElementById('hero').innerHTML=HEROES[dir];
  const mq=MQ[dir].map(s=>`<span>${s}</span>`).join('');
  document.getElementById('mq').innerHTML=mq+mq;
  document.getElementById('t1head').textContent=T1HEAD[dir];
  document.getElementById('archhead').textContent=ARCHHEAD[dir];
  document.getElementById('t1count').textContent='13 flagship publications';
  document.getElementById('grid').innerHTML=COVERS.map(r=>coverCard(r,dir)).join('');
  document.getElementById('archgrid').innerHTML=ARCHIVE.map(archRow).join('');
  document.getElementById('note').innerHTML=NOTES[dir];
}
function setTheme(t){const pg=document.getElementById('pg'); pg.classList.toggle('dark',t==='dark'); pg.classList.toggle('light',t==='light');}

document.querySelectorAll('.seg.dir button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.seg.dir button').forEach(x=>x.classList.remove('on'));b.classList.add('on');render(b.dataset.dir);localStorage.setItem('lmg_dir',b.dataset.dir);});
document.querySelectorAll('.seg.theme button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.seg.theme button').forEach(x=>x.classList.remove('on'));b.classList.add('on');setTheme(b.dataset.theme);localStorage.setItem('lmg_theme',b.dataset.theme);});
document.getElementById('loadmore').onclick=()=>document.getElementById('archive').classList.add('open');

const dir0=localStorage.getItem('lmg_dir')||'a';
const theme0=localStorage.getItem('lmg_theme')||'dark';
document.querySelectorAll('.seg.dir button').forEach(x=>x.classList.toggle('on',x.dataset.dir===dir0));
document.querySelectorAll('.seg.theme button').forEach(x=>x.classList.toggle('on',x.dataset.theme===theme0));
render(dir0); setTheme(theme0);
</script>
</body>
</html>
